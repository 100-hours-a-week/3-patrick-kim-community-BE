spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://localhost:3306/kimyuchan?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=TRUE
    username: root
    password: __DB_PASSWORD_REMOVED__
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 중에는 create / create-drop / update 중 선택
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: __JWT_SECRET_REMOVED__
  access-token-expiration: 1500000  # 15분 (밀리초)
  refresh-token-expiration: 604800000  # 7일 (밀리초)


spring.cloud.aws:
  s3:
    bucket: kakao-community-bucket  # 본인의 S3 버킷 이름으로 변경
  credentials:
    accessKey: __AWS_ACCESS_KEY_REMOVED__  # 본인의 AWS Access Key로 변경
    secretKey: __AWS_SECRET_KEY_REMOVED__  # 본인의 AWS Secret Key로 변경
  region:
    static: ap-northeast-2  # 서울 리전
  stack:
    auto: false