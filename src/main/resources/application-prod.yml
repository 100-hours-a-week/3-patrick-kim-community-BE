# 운영 환경 설정
spring:
  jpa:
    hibernate:
      ddl-auto: validate  # 운영에서는 절대 update 사용 금지
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST:43.201.243.102}
      port: ${REDIS_PORT:6379}

  # AWS SQS 설정 (Phase 10)
  cloud:
    aws:
      region:
        static: ap-northeast-2
      sqs:
        enabled: true

# 애플리케이션 커스텀 설정
app:
  sqs:
    vote-queue-name: ${SQS_VOTE_QUEUE:petstar-votes}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.example.kakaocommunity: INFO
  file:
    name: /var/log/kakao-community/application.log